[build]
  functions = "netlify/functions"
  publish = "public"

[dev]
  functions = "netlify/functions"
  # port: আপনার ব্রাউজার যে পোর্ট দেখবে (এটি আপনি কমান্ড দিয়েও পরিবর্তন করতে পারেন)
  port = 8888
  # targetPort: আপনার অ্যাপ সার্ভারের পোর্ট (port থেকে আলাদা হতে হবে)
  targetPort = 8889
  functionsPort = 5000
  framework = "#custom"
  command = "npx netlify functions:serve --port 5000"
  autoLaunch = false

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/salami/*"
  to = "/salami-link.html"
  status = 200

[[redirects]]
  from = "/dashboard"
  to = "/dashboard.html"
  status = 200

[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200